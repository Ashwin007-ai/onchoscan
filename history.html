<script src="app.js"></script>
<script>
(async function() {
  var tk = localStorage.getItem("oncho_token");
  if (!tk) return;
  try {
    var res  = await fetch("https://onchoscan-api.onrender.com/history", { headers: { "Authorization": "Bearer " + tk } });
    if (res.status === 401) { window.logout(); return; }
    var data = await res.json();
    var list = data.history || [];
    document.getElementById("historyCount").textContent = list.length + " record" + (list.length !== 1 ? "s" : "");
    if (list.length === 0) {
      document.getElementById("historyContent").innerHTML = '<div class="empty-state"><div class="empty-icon">🔬</div><p>No predictions yet.</p><a href="/app/dashboard.html" class="btn-primary" style="display:inline-flex;margin-top:12px">Go to Dashboard</a></div>';
      return;
    }
    document.getElementById("historyContent").innerHTML = list.map(function(r) {
      var rc = r.risk_level === "High Risk" ? "high" : r.risk_level === "Medium Risk" ? "medium" : "low";
      var dt = new Date(r.timestamp).toLocaleString();
      var isBatch = r.analysis_type === 'batch';
      var typeIcon = r.cancer_type === 'brain' ? '🧠' : '🔬';
      var badge = isBatch
        ? '<span style="font-size:0.65rem;font-weight:700;padding:2px 8px;border-radius:10px;background:rgba(0,212,255,0.12);color:#00d4ff;border:1px solid rgba(0,212,255,0.25);margin-left:6px">BATCH</span>'
        : '<span style="font-size:0.65rem;font-weight:700;padding:2px 8px;border-radius:10px;background:rgba(79,255,176,0.1);color:#4fffb0;border:1px solid rgba(79,255,176,0.2);margin-left:6px">SINGLE</span>';
      return '<div class="history-row">' +
        '<div class="hist-icon">' + typeIcon + '</div>' +
        '<div class="hist-info"><strong>' + r.prediction + badge + '</strong><small>' + r.cancer_type.toUpperCase() + ' · ' + dt + '</small></div>' +
        '<div class="hist-conf">' + r.confidence + '%</div>' +
        '<div class="risk-chip ' + rc + '">' + r.risk_level + '</div>' +
        '<a href="https://onchoscan-api.onrender.com/' + r.report + '" target="_blank" class="hist-download">⬇ PDF</a>' +
      '</div>';
    }).join("");
  } catch(e) {
    document.getElementById("historyCount").textContent = "Error";
    document.getElementById("historyContent").innerHTML = "<p style='color:#e55;padding:20px'>Failed to load. Is the backend running?</p>";
  }
})();
</script>
